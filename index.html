<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/button.min.css">
</head>
<body>
    <div class="container lotto-section">
        <h2>🍀 로또 번호 자동 추천</h2>
        <p class="subtitle">오늘의 행운을 시험해 보세요!</p>
        <div class="numbers" id="lotto-numbers">
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
        </div>
        <button id="generate-lotto" class="btn primary">번호 생성하기</button>
    </div>

    <div class="container main-section">
        <h1>나와 닮은 동물 찾기 🐶🐱</h1>
        <p class="subtitle">AI가 분석하는 나의 동물상 테스트</p>
        
        <div class="test-container">
            <div id="upload-area" class="upload-area">
                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                <p>사진을 드래그하거나 클릭하여 업로드하세요</p>
                <input type="file" id="image-upload" accept="image/*" hidden>
            </div>
            
            <div id="webcam-section" class="webcam-section" style="display: none;">
                <div id="webcam-container"></div>
            </div>

            <div class="action-buttons">
                <button id="start-webcam" class="btn secondary">웹캠 시작</button>
                <button id="trigger-upload" class="btn primary">사진 업로드</button>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>AI가 분석 중입니다...</p>
            </div>

            <div id="result-area" class="result-area" style="display: none;">
                <div id="label-container"></div>
                <div class="result-message" id="result-message"></div>
                <button id="retry" class="btn outline">다시 하기</button>
            </div>
        </div>
    </div>

    <div class="container partnership-section">
        <h2>🤝 제휴 문의</h2>
        <p>함께 성장할 파트너를 찾습니다. 제휴 관련 내용을 남겨주세요.</p>
        <form action="https://formspree.io/f/xeepbgrk" method="POST" id="partnership-form">
            <div class="form-group">
                <label for="name">성함 / 담당자명</label>
                <input type="text" id="name" name="name" required placeholder="홍길동">
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="company">회사명 / 소속</label>
                <input type="text" id="company" name="company" placeholder="회사명을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="message">제휴 문의 내용</label>
                <textarea id="message" name="message" rows="5" required placeholder="제휴하고 싶은 내용이나 제안을 상세히 적어주세요."></textarea>
            </div>
            <button type="submit" class="submit-btn">제휴 신청하기</button>
        </form>
    </div>

    <div class="container comments-section">
        <h2>💬 댓글</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-vq5igsqj6x.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
